<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F$CKSPEDTRANS v1.1.17</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        .input-glow:focus { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .error-border { border-color: #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; }
    </style>
</head>
<body class="text-slate-100 min-h-screen pb-10">

    <div class="bg-blue-600 text-[10px] text-center py-2 font-bold uppercase tracking-[0.4em] text-white shadow-lg sticky top-0 z-[60]">
        LEO-TRANS SYSTEM | STABLE v1.1.17
    </div>

    <header class="p-6 border-b border-slate-800 glass shadow-2xl">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-extrabold tracking-tighter text-blue-500 uppercase italic">F$CKSPED<span class="text-white">TRANS</span></h1>
            <span class="bg-blue-500/10 text-blue-400 text-[10px] px-3 py-1 rounded-full border border-blue-500/20 font-mono">v1.1.17</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 md:p-8 space-y-8">
        
        <!-- DANE OSOBNE (POZA PLIKIEM) -->
        <section class="space-y-4">
            <div class="bg-slate-900 border-2 border-blue-500 p-6 rounded-3xl space-y-5 shadow-2xl">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase font-black text-blue-300 ml-1">Spedytor / STOL *</label>
                        <input type="text" id="input_spedytor" placeholder="Twoje inicjały..." class="w-full bg-slate-950 border border-slate-700 p-4 rounded-xl outline-none input-glow text-white font-bold text-lg">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] uppercase font-black text-blue-300 ml-1">Pojazd LEO *</label>
                        <input type="text" id="input_leo" placeholder="np. LEO001..." class="w-full bg-slate-950 border border-slate-700 p-4 rounded-xl outline-none input-glow text-white font-black text-lg uppercase">
                    </div>
                </div>
            </div>
        </section>

        <!-- PLIKI -->
        <section class="grid grid-cols-2 gap-4">
            <div class="relative h-32 bg-slate-900 border border-slate-800 rounded-2xl flex flex-col items-center justify-center hover:border-blue-500 transition-all active:scale-95">
                <input type="file" id="cameraInput" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 z-20">
                <div id="cameraIcon" class="text-3xl mb-1">📸</div>
                <p class="text-[10px] font-black uppercase text-slate-500">Aparat</p>
            </div>
            <div class="relative h-32 bg-slate-900 border border-slate-800 rounded-2xl flex flex-col items-center justify-center hover:border-blue-500 transition-all active:scale-95">
                <input type="file" id="fileInput" accept="image/*,application/pdf" class="absolute inset-0 opacity-0 z-20">
                <div id="fileIcon" class="text-3xl mb-1">📄</div>
                <p class="text-[10px] font-black uppercase text-slate-500">Wgraj PDF</p>
            </div>
        </section>

        <!-- DODATKI -->
        <section class="bg-slate-900/50 border border-slate-800 p-6 rounded-3xl space-y-6 shadow-xl">
            <div class="grid grid-cols-2 gap-5">
                <input type="number" id="km" placeholder="KM" oninput="calcRate()" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl font-black outline-none input-glow text-blue-400 text-xl">
                <input type="number" id="cena" placeholder="EUR" oninput="calcRate()" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl font-black outline-none input-glow text-green-400 text-xl">
            </div>
            <div id="rateBox" class="hidden p-4 rounded-xl bg-black/60 flex justify-between items-center border border-slate-800">
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest italic">Stawka rzeczywista:</span>
                <span id="rateValue" class="text-xl font-black italic">--</span>
            </div>
        </section>

        <button type="button" onclick="sendToN8n()" id="sendBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-7 rounded-2xl shadow-2xl uppercase tracking-[0.3em] text-sm transition-all active:scale-95 flex items-center justify-center gap-4">
            <span id="btnLabel">Zatwierdź i Wyślij</span>
        </button>

        <div id="debugConsole" class="hidden mt-6 bg-black/90 border border-slate-800 rounded-2xl p-5 font-mono text-[9px] text-slate-400 space-y-1 max-h-40 overflow-y-auto"></div>

    </main>

    <script>
        const BASE_N8N_URL = 'https://ireneuszkalinowski13.app.n8n.cloud/webhook-test/f-ckspedtrans-data';

        function logDebug(msg, isError = false) {
            const c = document.getElementById('debugConsole');
            c.classList.remove('hidden');
            const e = document.createElement('div');
            e.className = isError ? 'text-red-500' : 'text-blue-400';
            e.innerText = `> ${msg}`;
            c.appendChild(e);
            c.scrollTop = c.scrollHeight;
        }

        function calcRate() {
            const km = parseFloat(document.getElementById('km').value);
            const cena = parseFloat(document.getElementById('cena').value);
            const val = document.getElementById('rateValue');
            const box = document.getElementById('rateBox');
            if(km > 0 && cena > 0) {
                const r = (cena / km).toFixed(2);
                val.innerText = `${r} EUR/KM`;
                box.classList.remove('hidden');
                val.className = r >= 0.88 ? 'text-xl font-black text-green-400 italic' : (r >= 0.77 ? 'text-xl font-black text-blue-400 italic' : 'text-xl font-black text-red-500 italic');
            } else { box.classList.add('hidden'); }
        }

        async function sendToN8n() {
            const btn = document.getElementById('sendBtn');
            const label = document.getElementById('btnLabel');
            const leoVal = document.getElementById('input_leo').value.trim();
            const spedVal = document.getElementById('input_spedytor').value.trim();

            if (!leoVal || !spedVal) {
                logDebug("BŁĄD: LEO i Spedytor wymagane!", true);
                return;
            }

            try {
                btn.disabled = true;
                label.innerText = 'WYSYŁANIE...';

                // DANE W URL (Query)
                const finalUrl = `${BASE_N8N_URL}?leo=${encodeURIComponent(leoVal.toUpperCase())}&spedytor=${encodeURIComponent(spedVal)}`;
                
                const fd = new FormData();
                const cam = document.getElementById('cameraInput').files[0];
                const pdf = document.getElementById('fileInput').files[0];
                if(cam) fd.append('photo', cam);
                if(pdf) fd.append('pdf', pdf);
                
                fd.append('km', document.getElementById('km').value);
                fd.append('cena', document.getElementById('cena').value);
                fd.append('timestamp', new Date().toISOString());

                const res = await fetch(finalUrl, { method: 'POST', body: fd });
                if(res.ok) {
                    btn.classList.replace('bg-blue-600', 'bg-green-600');
                    label.innerText = 'SUKCES! WYŚLIJ NOWY';
                    logDebug("✅ DANE WYSŁANE");
                }
            } catch (e) {
                logDebug(`❌ BŁĄD: ${e.message}`, true);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
