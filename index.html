<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F$CKSPEDTRANS v1.1.14</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617;
            -webkit-tap-highlight-color: transparent;
        }
        .glass {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
        }
        .input-glow:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
        .error-border {
            border-color: #ef4444 !important;
            background: rgba(239, 68, 68, 0.1) !important;
        }
        .stat-card {
            background: linear-gradient(145deg, #0f172a, #1e293b);
            border: 1px solid #334155;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen pb-10">

    <div class="bg-blue-600 text-[10px] text-center py-1.5 font-bold uppercase tracking-[0.3em] text-white shadow-lg">
        LEO-TRANS LOGISTICS SYSTEM | SEPARATE DATA MODE
    </div>

    <header class="p-4 md:p-6 border-b border-slate-800 sticky top-0 z-50 glass shadow-2xl">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-extrabold tracking-tighter text-blue-500 uppercase italic">
                F$CKSPED<span class="text-white">TRANS</span>
            </h1>
            <div class="flex items-center gap-3">
                <span class="bg-blue-500/10 text-blue-400 text-[10px] px-2 py-1 rounded-full border border-blue-500/20 font-mono font-bold">v1.1.14</span>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 md:p-8 space-y-8">
        
        <!-- SEKCJA OSOBNA: IDENTYFIKACJA -->
        <section class="space-y-4">
            <div class="flex items-center gap-2 px-1">
                <div class="h-4 w-1 bg-blue-500 rounded-full"></div>
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Identyfikacja (Query Data)</h2>
            </div>

            <div class="stat-card p-6 rounded-3xl space-y-4 shadow-xl">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[9px] uppercase font-bold text-blue-400 ml-2 italic">Spedytor / STOL</label>
                        <input type="text" id="input_spedytor" placeholder="Twoje inicjały..." class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none input-glow text-white font-semibold">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] uppercase font-bold text-blue-400 ml-2 italic">Numer Pojazdu</label>
                        <input type="text" id="input_leo" placeholder="np. LEO001..." class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none input-glow text-white font-bold uppercase">
                    </div>
                </div>
            </div>
        </section>

        <!-- SEKCJA: PLIKI -->
        <section class="space-y-4">
            <div class="flex items-center gap-2 px-1">
                <div class="h-4 w-1 bg-blue-500 rounded-full"></div>
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Załączniki (Binary Data)</h2>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="relative group h-28 bg-slate-900 border border-slate-800 rounded-2xl flex flex-col items-center justify-center overflow-hidden hover:border-blue-500 transition-all active:scale-95">
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 cursor-pointer z-20">
                    <div id="cameraIcon" class="text-2xl mb-1">📸</div>
                    <p class="text-[9px] font-black uppercase text-slate-500 tracking-tighter">Zrób Zdjęcie</p>
                </div>
                <div class="relative group h-28 bg-slate-900 border border-slate-800 rounded-2xl flex flex-col items-center justify-center overflow-hidden hover:border-blue-500 transition-all active:scale-95">
                    <input type="file" id="fileInput" accept="image/*,application/pdf" class="absolute inset-0 opacity-0 cursor-pointer z-20">
                    <div id="fileIcon" class="text-2xl mb-1">📄</div>
                    <p class="text-[9px] font-black uppercase text-slate-500 tracking-tighter">Wybierz PDF</p>
                </div>
            </div>
            <div id="fileStatus" class="hidden text-center text-[10px] text-blue-400 font-mono font-bold py-2 bg-blue-500/5 rounded-lg border border-blue-500/20"></div>
        </section>

        <!-- SEKCJA: DODATKOWE -->
        <section class="space-y-4">
            <div class="bg-slate-900/50 border border-slate-800 p-6 rounded-3xl space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="relative">
                        <input type="number" id="km" placeholder="KM" oninput="calcRate()" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl font-black outline-none input-glow text-blue-400 text-lg">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] text-slate-600 font-bold uppercase">Km</span>
                    </div>
                    <div class="relative">
                        <input type="number" id="cena" placeholder="Cena" oninput="calcRate()" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl font-black outline-none input-glow text-green-400 text-lg">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] text-slate-600 font-bold uppercase">Eur</span>
                    </div>
                </div>
                <div id="rateBox" class="hidden p-4 rounded-xl bg-black/40 flex justify-between items-center border border-slate-800">
                    <span class="text-[10px] font-bold text-slate-500 uppercase italic">Stawka/KM:</span>
                    <span id="rateValue" class="text-lg font-black italic tracking-tighter">--</span>
                </div>
            </div>
        </section>

        <button type="button" onclick="sendToN8n()" id="sendBtn" class="w-full bg-blue-600 hover:bg-blue-400 text-white font-black py-6 rounded-2xl shadow-2xl uppercase tracking-[0.2em] text-sm transition-all active:scale-95 flex items-center justify-center gap-3">
            <span id="btnLabel">Zatwierdź i Wyślij</span>
        </button>

        <div id="debugConsole" class="hidden mt-4 bg-black border border-slate-800 rounded-xl p-4 font-mono text-[9px] text-slate-400 space-y-1 max-h-32 overflow-y-auto"></div>

    </main>

    <footer class="max-w-4xl mx-auto p-12 text-center opacity-20">
        <p class="text-[8px] font-black uppercase tracking-[0.6em] italic">LEO-TRANS AI AGENT CONNECT</p>
    </footer>

    <script>
        const BASE_N8N_URL = 'https://ireneuszkalinowski13.app.n8n.cloud/webhook-test/f-ckspedtrans-data';

        function logDebug(msg, isError = false) {
            const c = document.getElementById('debugConsole');
            c.classList.remove('hidden');
            const e = document.createElement('div');
            e.className = isError ? 'text-red-500' : 'text-blue-400';
            e.innerText = `> ${msg}`;
            c.appendChild(e);
            c.scrollTop = c.scrollHeight;
        }

        function calcRate() {
            const km = parseFloat(document.getElementById('km').value);
            const cena = parseFloat(document.getElementById('cena').value);
            const val = document.getElementById('rateValue');
            const box = document.getElementById('rateBox');
            if(km > 0 && cena > 0) {
                const r = (cena / km).toFixed(2);
                val.innerText = `${r} EUR/KM`;
                box.classList.remove('hidden');
                val.className = r >= 0.88 ? 'text-lg font-black text-green-400 italic' : (r >= 0.77 ? 'text-lg font-black text-blue-400 italic' : 'text-lg font-black text-red-500 italic');
            } else { box.classList.add('hidden'); }
        }

        document.getElementById('cameraInput').onchange = () => { if(document.getElementById('cameraInput').files[0]) { document.getElementById('fileStatus').innerText = "FOTO: GOTOWE"; document.getElementById('fileStatus').classList.remove('hidden'); document.getElementById('cameraIcon').innerText = "✅"; } };
        document.getElementById('fileInput').onchange = () => { if(document.getElementById('fileInput').files[0]) { document.getElementById('fileStatus').innerText = "PDF: GOTOWY"; document.getElementById('fileStatus').classList.remove('hidden'); document.getElementById('fileIcon').innerText = "✅"; } };

        async function sendToN8n() {
            const btn = document.getElementById('sendBtn');
            const label = document.getElementById('btnLabel');
            const leoVal = document.getElementById('input_leo').value.trim();
            const spedVal = document.getElementById('input_spedytor').value.trim();

            document.getElementById('input_leo').classList.remove('error-border');
            document.getElementById('input_spedytor').classList.remove('error-border');

            if (!leoVal || !spedVal) {
                if(!leoVal) document.getElementById('input_leo').classList.add('error-border');
                if(!spedVal) document.getElementById('input_spedytor').classList.add('error-border');
                logDebug("BŁĄD: LEO i Spedytor są obowiązkowe!", true);
                return;
            }

            try {
                btn.disabled = true;
                btn.classList.add('opacity-50');
                label.innerText = 'WYSYŁANIE...';

                // BUDOWANIE URL Z PARAMETRAMI (Osobno wyciągnięte dane)
                const finalUrl = `${BASE_N8N_URL}?leo=${encodeURIComponent(leoVal.toUpperCase())}&spedytor=${encodeURIComponent(spedVal)}`;
                
                const fd = new FormData();
                const cam = document.getElementById('cameraInput').files[0];
                const pdf = document.getElementById('fileInput').files[0];
                
                if(cam) fd.append('photo', cam);
                if(pdf) fd.append('pdf', pdf);
                
                // Dane dodatkowe w body (opcjonalnie)
                fd.append('km', document.getElementById('km').value);
                fd.append('cena', document.getElementById('cena').value);
                fd.append('timestamp', new Date().toISOString());

                logDebug(`Wysyłka na URL: ${finalUrl}`);

                const res = await fetch(finalUrl, { method: 'POST', body: fd });

                if(res.ok) {
                    btn.classList.replace('bg-blue-600', 'bg-green-600');
                    label.innerText = 'WYŚLIJ KOLEJNY';
                    logDebug("✅ SUKCES: Dane przesłane osobno!");
                } else {
                    logDebug(`❌ BŁĄD SERWERA: ${res.status}`, true);
                    label.innerText = 'SPRÓBUJ PONOWNIE';
                }
            } catch (e) {
                logDebug(`❌ KRYTYCZNY BŁĄD: ${e.message}`, true);
                label.innerText = 'BŁĄD POŁĄCZENIA';
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        }
    </script>
</body>
</html>
