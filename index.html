<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F$CKSPEDTRANS v1.1.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617;
            -webkit-tap-highlight-color: transparent;
        }
        .glass {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
        }
        .input-glow:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen pb-10">

    <div class="bg-blue-600 text-[10px] text-center py-1.5 font-bold uppercase tracking-[0.3em] text-white">
        System Przywrócony • Stabilna Wersja v1.1.8
    </div>

    <header class="p-4 md:p-6 border-b border-slate-800 sticky top-0 z-50 glass shadow-2xl">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-extrabold tracking-tighter text-blue-500 uppercase italic">
                F$CKSPED<span class="text-white">TRANS</span>
            </h1>
            <div class="flex items-center gap-3">
                <div id="rateDisplay" class="hidden sm:flex bg-slate-800 px-3 py-1 rounded-lg border border-slate-700 items-center gap-2 font-mono text-xs">
                    <span class="text-[9px] uppercase text-slate-500 font-bold tracking-widest">Rate:</span>
                    <span id="liveRate">--</span>
                </div>
                <span class="bg-red-500/10 text-red-400 text-[10px] px-2 py-1 rounded-full border border-red-500/20 font-mono">v1.1.8</span>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 md:p-8 space-y-8">
        
        <!-- Sekcja 1: Pliki -->
        <section class="space-y-4">
            <div class="flex items-center gap-2 px-1">
                <div class="h-4 w-1 bg-blue-500 rounded-full"></div>
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest">1. Dokumentacja</h2>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="relative group h-32 bg-slate-900 border-2 border-dashed border-slate-700 rounded-2xl flex flex-col items-center justify-center overflow-hidden hover:border-blue-500 transition-all active:scale-95">
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 cursor-pointer z-20">
                    <div id="cameraIcon" class="text-3xl mb-1">📸</div>
                    <p class="text-[10px] font-black uppercase text-slate-400">Zrób zdjęcie</p>
                </div>
                <div class="relative group h-32 bg-slate-900 border-2 border-dashed border-slate-700 rounded-2xl flex flex-col items-center justify-center overflow-hidden hover:border-blue-500 transition-all active:scale-95">
                    <input type="file" id="fileInput" accept="image/*,application/pdf" class="absolute inset-0 opacity-0 cursor-pointer z-20">
                    <div id="fileIcon" class="text-3xl mb-1">📄</div>
                    <p class="text-[10px] font-black uppercase text-slate-400">Dodaj PDF</p>
                </div>
            </div>
            <div id="fileStatus" class="hidden text-center text-[10px] text-blue-400 font-mono font-bold bg-blue-500/5 py-3 rounded-xl border border-blue-500/20"></div>
        </section>

        <!-- Sekcja 2: Dane -->
        <section class="space-y-4">
            <div class="flex items-center gap-2 px-1">
                <div class="h-4 w-1 bg-blue-500 rounded-full"></div>
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest">2. Dane operacyjne</h2>
            </div>

            <div class="bg-slate-900/50 border border-slate-800 p-6 md:p-8 rounded-3xl space-y-6 shadow-2xl">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="firma" placeholder="Firma / Klient" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl outline-none input-glow text-white font-semibold">
                    <select id="leoCode" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl outline-none input-glow text-white font-bold cursor-pointer">
                        <option value="" disabled selected>Pojazd LEO...</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="kodStart" placeholder="Kod Start" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl text-center font-mono outline-none input-glow font-bold">
                    <input type="text" id="kodKoniec" placeholder="Kod Koniec" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl text-center font-mono outline-none input-glow font-bold">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="relative">
                        <input type="number" id="km" placeholder="KM" oninput="calcRate()" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl font-black outline-none input-glow text-blue-400 text-lg">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] text-slate-600 font-bold uppercase">Km</span>
                    </div>
                    <div class="relative">
                        <input type="number" id="cena" placeholder="Cena" oninput="calcRate()" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl font-black outline-none input-glow text-green-400 text-lg">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] text-slate-600 font-bold uppercase tracking-widest">Eur</span>
                    </div>
                </div>

                <div id="rateBox" class="hidden p-4 rounded-2xl border border-slate-800 bg-slate-950/50 flex justify-between items-center transition-all animate-pulse">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Stawka rzeczywista</span>
                    <span id="rateValue" class="text-xl font-black italic tracking-tighter">-- EUR/KM</span>
                </div>
            </div>
        </section>

        <button onclick="sendToN8n()" id="sendBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-6 rounded-2xl shadow-xl uppercase tracking-[0.2em] text-sm transition-all active:scale-95 flex items-center justify-center gap-3">
            <span id="btnLabel">Wyślij do Agenta AI</span>
        </button>

    </main>

    <footer class="max-w-4xl mx-auto p-12 text-center opacity-30">
        <p class="text-[9px] font-black uppercase tracking-[0.5em] italic">Optimization over frustration</p>
    </footer>

    <script>
        const N8N_URL = 'https://ireneuszkalinowski13.app.n8n.cloud/webhook/f-ckspedtrans-data';

        const select = document.getElementById('leoCode');
        for(let i=1; i<=178; i++) {
            const code = `LEO${i.toString().padStart(3, '0')}`;
            select.add(new Option(code, code));
        }

        function calcRate() {
            const km = parseFloat(document.getElementById('km').value);
            const cena = parseFloat(document.getElementById('cena').value);
            const box = document.getElementById('rateBox');
            const val = document.getElementById('rateValue');
            const live = document.getElementById('liveRate');

            if(km > 0 && cena > 0) {
                const rate = (cena / km).toFixed(2);
                val.innerText = `${rate} EUR/KM`;
                live.innerText = `${rate} EUR`;
                box.classList.remove('hidden');
                
                // Twoje progi: 0.77 (3.5t) / 0.88 (7.5t)
                if(rate >= 0.88) { val.className = 'text-xl font-black text-green-400 italic'; live.className = 'text-green-400'; }
                else if(rate >= 0.77) { val.className = 'text-xl font-black text-blue-400 italic'; live.className = 'text-blue-400'; }
                else { val.className = 'text-xl font-black text-red-500 italic'; live.className = 'text-red-500'; }
            } else {
                box.classList.add('hidden');
                live.innerText = '--';
            }
        }

        const statusUpdate = () => {
            const c = document.getElementById('cameraInput').files[0];
            const f = document.getElementById('fileInput').files[0];
            const s = document.getElementById('fileStatus');
            if(c || f) {
                s.innerText = `GOTOWE DO WYSŁANIA: ${c ? 'ZDJĘCIE ' : ''}${f ? 'PLIK PDF' : ''}`;
                s.classList.remove('hidden');
                if(c) document.getElementById('cameraIcon').innerText = "✅";
                if(f) document.getElementById('fileIcon').innerText = "✅";
            }
        };
        document.getElementById('cameraInput').onchange = statusUpdate;
        document.getElementById('fileInput').onchange = statusUpdate;

        async function sendToN8n() {
            const btn = document.getElementById('sendBtn');
            const btnLabel = document.getElementById('btnLabel');
            const cam = document.getElementById('cameraInput').files[0];
            const pdf = document.getElementById('fileInput').files[0];
            
            btn.disabled = true;
            btn.classList.add('opacity-50');
            btnLabel.innerText = 'WYSYŁANIE...';

            const fd = new FormData();
            if(cam) fd.append('photo', cam);
            if(pdf) fd.append('pdf', pdf);
            fd.append('firma', document.getElementById('firma').value);
            fd.append('leo', document.getElementById('leoCode').value);
            fd.append('kod_start', document.getElementById('kodStart').value);
            fd.append('kod_koniec', document.getElementById('kodKoniec').value);
            fd.append('km', document.getElementById('km').value);
            fd.append('cena', document.getElementById('cena').value);
            fd.append('timestamp', new Date().toISOString());

            try {
                // Najbardziej stabilny sposób wysyłki bez dodatkowych nagłówków
                const res = await fetch(N8N_URL, { 
                    method: 'POST', 
                    body: fd 
                });

                if(res.ok) {
                    btn.classList.replace('bg-blue-600', 'bg-green-600');
                    btnLabel.innerText = 'SUKCES! ODEBRANO';
                    setTimeout(() => location.reload(), 2000);
                } else {
                    const errorMsg = await res.text();
                    alert(`BŁĄD n8n (${res.status}): ${errorMsg || 'Workflow nieaktywny'}`);
                    btn.disabled = false;
                    btn.classList.remove('opacity-50');
                    btnLabel.innerText = 'Spróbuj ponownie';
                }
            } catch (e) {
                alert(`🔴 BŁĄD POŁĄCZENIA!\n\n1. Sprawdź czy n8n jest ACTIVE.\n2. Sprawdź nagłówek CORS w n8n: Access-Control-Allow-Origin: *`);
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                btnLabel.innerText = 'Błąd - Spróbuj ponownie';
            }
        }
    </script>
</body>
</html>
